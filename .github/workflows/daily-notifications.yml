name: Daily Notifications

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Send now even outside 10:00 Prague'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm --prefix automation ci

      - name: Send notifications
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          APP_LINK: ${{ secrets.APP_LINK }}
          FORCE_SEND: ${{ github.event.inputs.force_send == 'true' && '1' || '0' }}
        run: npm --prefix automation run send

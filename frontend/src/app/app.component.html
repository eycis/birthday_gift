<main class="page">
  <section class="card pixel-frame">
    <header class="window-top">
      <span class="dot dot-pink"></span>
      <span class="dot dot-mint"></span>
      <span class="dot dot-blue"></span>
      <p class="window-title">daily-letter.exe</p>
    </header>

    <div class="sparkles" aria-hidden="true">
      <span>+</span>
      <span>x</span>
      <span>+</span>
      <span>x</span>
    </div>

    <h1>Message Of The Day</h1>

    @if (loading) {
      <p class="state">Loading cute pixels...</p>
    } @else if (error) {
      <p class="state state-error">{{ error }}</p>
    } @else if (dailyMessage) {
      <p class="message">{{ dailyMessage.body }}</p>
    } @else {
      <p class="state">No message for today yet.</p>
    }

    <div class="notifications-box">
      <button type="button" class="pixel-button" (click)="enableNotifications()">
        click on me
      </button>

      @if (notificationState) {
        <p class="notifications-state">{{ notificationState }}</p>
      }
    </div>
  </section>
</main>
